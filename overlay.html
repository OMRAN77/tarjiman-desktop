<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<title>Tarjiman Desktop</title>
<style>
  html, body {
    margin: 0; padding: 0; background: transparent;
    width: 100%; height: 100%; overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
    user-select: none;
  }
  #bar {
    -webkit-app-region: drag;
    display: flex; align-items: center; justify-content: center;
    gap: 8px;
    padding: 4px 10px;
    background: rgba(0,0,0,0.001); /* invisible but still a drag surface */
    height: 22px;
  }
  #bar button {
    -webkit-app-region: no-drag;
    background: rgba(20,20,20,0.55);
    color: #fff; border: none; border-radius: 6px;
    padding: 2px 8px; font-size: 12px; cursor: pointer;
  }
  #bar button.active { background: #1f9d55; }
  #bar select {
    -webkit-app-region: no-drag;
    background: rgba(20,20,20,0.55); color: #fff; border: none;
    border-radius: 6px; font-size: 11px; padding: 2px 4px;
  }
  #captionBox {
    -webkit-app-region: drag;
    display: flex; align-items: center; justify-content: center;
    min-height: 46px;
    padding: 6px 18px;
    text-align: center;
  }
  #captionText {
    color: #fff;
    font-size: 22px;
    font-weight: 700;
    line-height: 1.35;
    text-shadow: 0 0 6px rgba(0,0,0,0.95), 0 0 14px rgba(0,0,0,0.85), 2px 2px 3px rgba(0,0,0,0.9);
    max-width: 100%;
  }
  #captionText.empty { opacity: 0; }
</style>
</head>
<body>
  <div id="bar">
    <button id="btnToggle">▶️ ابدأ</button>
    <select id="targetLang">
      <option value="ar">AR عربي</option>
      <option value="en" selected>EN English</option>
      <option value="fr">FR</option>
      <option value="es">ES</option>
      <option value="tr">TR</option>
      <option value="ur">UR</option>
      <option value="hi">HI</option>
      <option value="fa">FA</option>
    </select>
    <button id="btnClickThrough">🖱️ تجاوز</button>
  </div>
  <div id="captionBox">
    <div id="captionText" class="empty">…</div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
