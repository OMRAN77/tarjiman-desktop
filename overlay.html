<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<title>Tarjiman Desktop</title>
<style>
  html, body {
    margin: 0; padding: 0; background: transparent;
    width: 100%; height: 100%; overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
    user-select: none;
  }
  #captionBox {
    -webkit-app-region: drag;
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    padding: 6px 18px;
    text-align: center;
    box-sizing: border-box;
  }
  #captionText {
    -webkit-app-region: no-drag;
    color: #fff;
    font-size: 22px;
    font-weight: 700;
    line-height: 1.35;
    text-shadow: 0 0 6px rgba(0,0,0,0.95), 0 0 14px rgba(0,0,0,0.85), 2px 2px 3px rgba(0,0,0,0.9);
    max-width: 100%;
  }
  #captionText.empty { opacity: 0; }
</style>
</head>
<body>
  <div id="captionBox">
    <div id="captionText" class="empty">…</div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
